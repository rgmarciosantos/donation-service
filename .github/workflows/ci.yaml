name: CI-CD

# =============================================================================
# donation-service (Go)
# =============================================================================

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write

env:
  GO_VERSION: "1.25.0"
  TRIVY_VERSION: "v0.70.0"
  AWS_REGION: us-east-1
  ECR_REPOSITORY: solidarytech/${{ github.event.repository.name }}
  IMAGE_TAG: ${{ github.sha }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  MIN_COVERAGE: "80"

jobs:
  build-test:
    name: Build & Unit Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v6
      - name: Configurar Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - name: Build
        run: go build ./...
      - name: Rodar testes unitários
        run: go test ./... -coverprofile=coverage.out -covermode=atomic
      - name: Verificar cobertura mínima
        run: |
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {print substr($3, 1, length($3)-1)}')
          echo "Cobertura total: ${total}% (mínimo exigido: ${MIN_COVERAGE}%)"
          awk -v c="$total" -v min="$MIN_COVERAGE" 'BEGIN { exit (c+0 >= min+0) ? 0 : 1 }' || {
            echo "::error::Cobertura ${total}% está abaixo do mínimo de ${MIN_COVERAGE}%"
            exit 1
          }

  lint:
    name: Linter / Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v6
      - name: Configurar Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - name: Resolver dependências (gera go.sum)
        run: go mod tidy
      - name: Rodar golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12

  security-scan:
    name: Security Scan (SAST & SCA)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v6
      - name: Configurar Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - name: Resolver dependências (gera go.sum)
        run: go mod tidy
      - name: SAST com gosec
        uses: securego/gosec@master
        continue-on-error: true
        with:
          args: ./...
      - name: SCA com Trivy (filesystem)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          version: ${{ env.TRIVY_VERSION }}
          scan-type: fs
          scan-ref: .
          severity: CRITICAL
          exit-code: 1
          ignore-unfixed: true

  docker-build-push:
    name: Docker Build & Push to ECR
    runs-on: ubuntu-latest
    needs: [build-test, lint, security-scan]
    if: |
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      github.ref == 'refs/heads/main'
    steps:
      - name: Checkout do código
        uses: actions/checkout@v6

      - name: Configurar credenciais AWS
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login no Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build da imagem Docker
        run: |
          docker build -t $ECR_REPOSITORY:$IMAGE_TAG .

      - name: Scan da imagem com Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          version: ${{ env.TRIVY_VERSION }}
          image-ref: ${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          format: table
          severity: CRITICAL
          exit-code: 1
          ignore-unfixed: true

      - name: Tag da imagem para ECR
        run: |
          docker tag $ECR_REPOSITORY:$IMAGE_TAG \
            ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Push da imagem para ECR
        run: |
          if ! docker push ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:$IMAGE_TAG; then
            echo "::warning::A tag $IMAGE_TAG já existe no ECR. Pulando push para evitar erro de imutabilidade."
            exit 0
          fi

      - name: Atualizar imagem no repo de deploy
        run: |
          FULL_IMAGE="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}"
          git clone https://x-access-token:${{ secrets.DEPLOY_REPO_TOKEN }}@github.com/${{ github.repository_owner }}/deploy-${{ github.event.repository.name }}.git deploy-repo

          cd deploy-repo

          echo "=== ANTES ==="
          grep "image:" manifests/deployment.yaml || true

          sed -i "s|image:.*${{ github.event.repository.name }}:.*|image: ${FULL_IMAGE}|" manifests/deployment.yaml

          echo "=== DEPOIS ==="
          grep "image:" manifests/deployment.yaml || true

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifests/deployment.yaml

          if git diff --cached --quiet; then
            echo "::warning::Nenhuma alteração detectada no manifesto — a imagem já estava atualizada."
            exit 0
          fi

          git commit -m "deploy: ${{ github.event.repository.name }} ${GITHUB_SHA::8}"
          git push origin main